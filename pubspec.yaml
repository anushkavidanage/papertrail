name: papertrail
description: "Track your purchase receipts, stored securely in your own Solid Pod."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.18+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9

  # Solid Pod integration: storage, encryption, auth, and ready-made UI.
  solidpod: ^1.0.10
  solidui: ^1.0.14

  # Create ZIP archives for backup and restore.
  archive: ^4.0.9

  # Pick receipt photos and PDF documents from the device.
  file_picker: ^11.0.2

  # Take photos directly from the device camera on Android and iOS.
  image_picker: ^1.1.0

  # Open downloaded PDF attachments with the platform's default viewer.
  open_filex: ^4.7.0

  # Resolve a temporary directory for staging downloaded attachments.
  path_provider: ^2.1.6

  # Generate and preview/print PDF summaries of receipts.
  pdf: ^3.11.1
  printing: ^5.13.3

  # Generate stable unique identifiers for each receipt.
  uuid: ^4.5.3

  # Charts for the Analytics screen.
  fl_chart: ^1.2.0

  # Pure-Dart image decoding / re-encoding used to compress oversized photos.
  image: ^4.8.0

  # Local push notifications for warranty reminders.
  flutter_local_notifications: ^18.0.0
  flutter_timezone: ^5.0.0
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Generates the platform launcher icons from assets/papertrail_logo.png.
  # Re-run after changing the logo: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.4

# Configuration for `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Individual files (not the whole folder) are listed so the large launcher
  # icon source image is not bundled into the app binary.
  assets:
    - assets/images/app_image.jpg
    - assets/images/app_icon.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
