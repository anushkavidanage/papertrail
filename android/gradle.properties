org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Disable Kotlin incremental compilation to avoid cache-locking failures on Windows
kotlin.incremental=false
# Flutter plugins ship with mixed Java/Kotlin JVM targets (e.g. fast_rsa uses
# Java 1.8 while flutter_timezone uses Java 11). AGP 9 removed BaseExtension so
# we can't override per-plugin Java targets from the root project. Downgrade the
# Kotlin 2.x strict validation to a warning so the build is not blocked.
kotlin.jvm.target.validation.mode=WARNING
