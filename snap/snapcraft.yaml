name: papertrail
version: 1.0.17
summary: Privacy preserving receipt manager.
description: |
  PaperTrail collects your receipts and securely stores them in your
  personal online data store (Pods) within a Data Vault hosted by your
  Solid Server of choice.

base: core24
grade: stable
confinement: strict

# 20251013 gjw Plugins that may be needed include the following, but are
# not required for every app:
#
#      - audio-playback
#      - pulseaudio
#      - screen-inhibit-control

apps:
  papertrail:
    command: papertrail
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
      - desktop
      - desktop-legacy
      - home
      - network
      - opengl
      - wayland
      - x11

# 20251013 gjw The `flutter_secure_storage` package (and maybe
# `vault_storage`) is used by `solidpod/solidui` to save secrets
# locally, if the app provides this option to the user to do so. Thus
# `libsecret-1-dev`, `libjsoncpp-dev`, `llvm`, and `lld` at least are
# required to build the installer and `libsecret-1-0` and
# `libjsoncpp1` to run the application. There may be more that are
# included below and need to test their removal to test. See
#
# https://github.com/juliansteenbakker/flutter_secure_storage/blob/develop/README.md
# https://pub.dev/packages/vault_storage/versions/2.2.0#platform-setup
#
#    build-packages:
#      - libsecret-1-dev
#      - libjsoncpp-dev
#      - llvm
#      - lld
#
#    stage-packages:
#      - libsecret-1-0
#      - libjsoncpp-dev
#
# 20251013 gjw If using the `audioplayers` package for flutter then
# the gstreamer packages are required for bulding the installer
# running the app.
#
#    build-packages:
#      - libgstreamer1.0-dev
#      - libgstreamer-plugins-base1.0-dev
#      - libgstreamer-plugins-good1.0-dev
#    stage-packages:
#      - libgstreamer1.0-0
#      - libgstreamer-plugins-base1.0-0
#      - libgstreamer-plugins-good1.0-0
#      - gstreamer1.0-plugins-good
#      - gstreamer1.0-plugins-base

parts:
  papertrail:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    build-packages:
      - binutils
      - clang
      - cmake
      - libblkid-dev
      - libgtk-3-dev
      - libjsoncpp-dev
      - liblzma-dev
      - libsecret-1-dev
      - libssl-dev
      - lld
      - llvm
      - ninja-build
    stage-packages:
      - libgtk-3-0
      - libjsoncpp-dev
      - libsecret-1-0
      - libssl3
